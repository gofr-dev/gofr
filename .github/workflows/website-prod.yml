name: Build and Deploy
permissions:
  contents: read

on:
  push:
    tags:
      - "v*.*.*"

env:
  APP_NAME: gofr-website
  WEBSITE_REGISTRY: ghcr.io
  GAR_PROJECT: raramuri-tech
  GAR_REGISTRY: kops-dev
  CLUSTER_NAME: raramuri-tech
  CLUSTER_PROJECT: raramuri-tech
  NAMESPACE: gofr-dev
  NAMESPACE_STAGE: gofr-dev-stg
jobs:
  dockerize:
    if: ${{ github.repository == 'gofr-dev/gofr' }}
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.output-image.outputs.image }}
    name: 🐳 Dockerize
    steps:
      - name: Checkout framework code
        uses: actions/checkout@v6

      # Pull the website source into a sibling directory so we can run
      # its build pipeline against fresh data on every prod tag, rather
      # than pulling whatever stale :latest happens to be on ghcr. This
      # is what guarantees prod ships with the GoFr release present in
      # the changelog and the up-to-date roadmap / contributors.
      - name: Checkout website source
        uses: actions/checkout@v6
        with:
          repository: gofr-dev/website
          ref: main
          path: website-src
          # Full history is required by utils/generate-doc-mtimes.mjs
          # which reads `git log` per source file for the visible
          # "Last updated" byline.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18.x

      - name: Install website deps
        working-directory: ./website-src
        run: yarn install --frozen-lockfile

      # Refresh GitHub-sourced data (releases, roadmap, team +
      # contributor scores, doc mtimes, changelog RSS) so prod bakes
      # in current state at deploy time. continue-on-error keeps the
      # build moving if a fetch fails — each script has a snapshot
      # fallback that preserves the previous JSON.
      - name: Refresh website data from GitHub
        working-directory: ./website-src
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn refresh-data
        continue-on-error: true

      - name: Login to GAR
        uses: docker/login-action@v4
        with:
          registry: us-central1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GOFR_WEBSITE_GOFR_DEV_DEPLOYMENT_KEY }}

      - name: Determine Image Tag
        id: determine-tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG=${{ github.sha }}-${{ github.run_id }}
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV

      # Build the website source-bundle image locally with the
      # freshly-refreshed data baked in. Tagged as ghcr.io/...:latest
      # purely for the *local* docker daemon — we don't push it to
      # ghcr. The framework's docs/Dockerfile then resolves its
      # FROM ghcr.io/gofr-dev/website:${WEBSITE_TAG=latest} against
      # the local image.
      - name: Build website source-bundle (with fresh data)
        run: |
          docker build \
            -t ghcr.io/gofr-dev/website:latest \
            -f ./website-src/Dockerfile \
            ./website-src/

      - name: Build framework docs image
        run: |
          docker build \
            --build-arg WEBSITE_TAG=latest \
            -t us-central1-docker.pkg.dev/${{ env.GAR_PROJECT }}/${{ env.GAR_REGISTRY }}/${{ env.APP_NAME }}:${{ env.TAG }} \
            -f ./docs/Dockerfile \
            .

      - name: Push framework docs image to GAR
        run: docker push us-central1-docker.pkg.dev/${{ env.GAR_PROJECT }}/${{ env.GAR_REGISTRY }}/${{ env.APP_NAME }}:${{ env.TAG }}

      - id: output-image
        run: echo "image=`echo us-central1-docker.pkg.dev/${{ env.GAR_PROJECT }}/${{ env.GAR_REGISTRY }}/${{ env.APP_NAME }}:${{ env.TAG }}`" >> "$GITHUB_OUTPUT"

  deployment:
    runs-on: ubuntu-latest
    name: 🚀 Deploy-Prod
    needs: dockerize
    container:
      image: ghcr.io/zopsmart/gha-images:deployments-0.1.3
      options: --rm
    env:
      image: ${{needs.dockerize.outputs.image}}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Authorize to GCP service account
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GOFR_WEBSITE_GOFR_DEV_DEPLOYMENT_KEY }}

      - name: Set GCloud Project and Fetch Cluster Credentials
        run: gcloud container clusters get-credentials ${{ env.CLUSTER_NAME }} --region=us-central1 --project=${{ env.CLUSTER_PROJECT }}

      - name: Update Deployment Image
        run: kubectl set image deployment/${{ env.APP_NAME }} ${{ env.APP_NAME }}=${{ env.image }} --namespace ${{ env.NAMESPACE }}
