name: Build and Deploy Website To Stage
permissions:
  contents: read

on:
  push:
    branches:
      - development
  # Daily refresh — runs an hour after the website's :stage cron
  # (gofr-dev/website at 04:00 UTC) so :stage is freshly published
  # before this rebuilds + redeploys against it.
  schedule:
    - cron: '0 5 * * *'
  # Manual button for ad-hoc redeploys (e.g. right after a new GoFr
  # release lands and you want stage to reflect it immediately).
  workflow_dispatch:

env:
  APP_NAME: gofr-website
  WEBSITE_REGISTRY: ghcr.io
  GAR_PROJECT: raramuri-tech
  GAR_REGISTRY: kops-dev
  CLUSTER_NAME: raramuri-tech
  CLUSTER_PROJECT: raramuri-tech
  NAMESPACE: gofr-dev
  NAMESPACE_STAGE: gofr-dev-stg

jobs:
  dockerize:
    if: ${{ github.repository == 'gofr-dev/gofr' }}
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.output-image.outputs.image }}
    name: 🐳 Dockerize
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GAR
        uses: docker/login-action@v4
        with:
          registry: us-central1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GOFR_WEBSITE_GOFR_DEV_STG_DEPLOYMENT_KEY }}

      - name: Log in to the GitHub Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.WEBSITE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download UI Image (:stage tracks gofr-dev/website's main)
        run: |
          docker pull ${{ env.WEBSITE_REGISTRY }}/gofr-dev/website:stage

      - name: Determine Image Tag
        id: determine-tag
        # Append run_id so each workflow run produces a unique image
        # tag — required for scheduled rebuilds (same SHA, fresh data
        # inside the image) to actually roll out via kubectl. Without
        # this, kubectl set image with an unchanged tag is a no-op and
        # the daily data refresh never reaches the running pods.
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG=${{ github.sha }}-${{ github.run_id }}
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV


      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          push: true
          context: ./
          file: ./docs/Dockerfile
          # Overlay framework docs onto the :stage source-bundle. Default
          # in the Dockerfile is :latest (used by website-prod.yml).
          build-args: WEBSITE_TAG=stage
          tags: us-central1-docker.pkg.dev/${{ env.GAR_PROJECT }}/${{ env.GAR_REGISTRY }}/${{ env.APP_NAME }}:${{ env.TAG }}

      - id: output-image
        run: echo "image=`echo us-central1-docker.pkg.dev/${{ env.GAR_PROJECT }}/${{ env.GAR_REGISTRY }}/${{ env.APP_NAME }}:${{ env.TAG }}`" >> "$GITHUB_OUTPUT"

  deployment_stage:
    runs-on: ubuntu-latest
    name: 🚀 Deploy-Stage
    needs: dockerize
    container:
      image: ghcr.io/zopsmart/gha-images:deployments-0.1.3
      options: --rm
    env:
      image: ${{needs.dockerize.outputs.image}}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Authorize to GCP service account
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GOFR_WEBSITE_GOFR_DEV_STG_DEPLOYMENT_KEY }}

      - name: Set GCloud Project and Fetch Cluster Credentials
        run: gcloud container clusters get-credentials ${{ env.CLUSTER_NAME }} --region=us-central1 --project=${{ env.CLUSTER_PROJECT }}

      - name: Update Deployment Image
        run: kubectl set image deployment/${{ env.APP_NAME }} ${{ env.APP_NAME }}=${{ env.image }} --namespace ${{ env.NAMESPACE_STAGE }}
