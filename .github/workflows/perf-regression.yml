name: Perf-Regression
permissions:
  contents: read

# Runs on PRs to development whenever a file under pkg/gofr changes.
# Reports microbenchmark deltas (ns/op, B/op, allocs/op) and fails the
# check if any benchmark regresses past the thresholds below.
#
# wrk-style end-to-end load testing is intentionally NOT run here:
# GitHub-hosted runners have variable CPU and produce too much noise
# for a numeric gate. We run wrk locally and post the numbers in the
# PR body. A future PR can move wrk into a dedicated self-hosted runner.
on:
  pull_request:
    branches:
      - development
      - main
    paths:
      - 'pkg/gofr/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/perf-regression.yml'

jobs:
  microbench:
    name: Microbenchmark regression gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install benchstat
        # Pinned commit so the awk parser below sees stable benchstat
        # output formatting. Bump deliberately when upstream stabilises.
        run: go install golang.org/x/perf/cmd/benchstat@v0.0.0-20240924224656-d8e21d7ae74e

      - name: Run benchmarks on PR HEAD
        run: |
          set -euo pipefail
          go test -bench='^Benchmark(Router_Get|Respond_|AttrBuild|SpanStart|Context_New|Request_FullChain)' \
            -benchmem -count=6 -benchtime=2s -run=^$ \
            ./pkg/gofr/ ./pkg/gofr/http/ ./pkg/gofr/metrics/ \
            | tee pr.txt

      - name: Run benchmarks on base
        run: |
          set -euo pipefail
          git checkout "${{ github.event.pull_request.base.sha }}"
          go test -bench='^Benchmark(Router_Get|Respond_|AttrBuild|SpanStart|Context_New|Request_FullChain)' \
            -benchmem -count=6 -benchtime=2s -run=^$ \
            ./pkg/gofr/ ./pkg/gofr/http/ ./pkg/gofr/metrics/ \
            | tee base.txt

      - name: Diff (benchstat)
        run: |
          benchstat base.txt pr.txt | tee benchstat.txt

      - name: Gate on regression
        # Fails when any sec/op delta is +>= 10%, B/op or allocs/op
        # delta is +>= 10%. benchstat reports deltas like "+5.42%" or
        # "~" (no significant change) per row.
        run: |
          set -euo pipefail
          awk '
            /^[A-Za-z]/ {
              for (i = NF; i > 0; i--) {
                if ($i ~ /^[+-][0-9.]+%$/) {
                  pct = $i
                  sub("%", "", pct)
                  sub("\\+", "", pct)
                  if (pct + 0 >= 10) {
                    print "regression in: " $0
                    found++
                  }
                  break
                }
              }
            }
            END { exit found ? 1 : 0 }
          ' benchstat.txt

      - name: Upload benchstat output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchstat
          path: |
            base.txt
            pr.txt
            benchstat.txt
