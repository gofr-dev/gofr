# Project allow-list for the typos CI check.
# Keep this file minimal — each entry is a real allow, not a typo we are tolerating.

[default.extend-words]
# wrk is the HTTP load-generator binary (https://github.com/wg/wrk),
# referenced from benchmark comments and the bench harness.
wrk = "wrk"

[default.extend-identifiers]
# W3C Trace Context span-id used as a test fixture in tracer_test.go:
#   parentSpan = "00f067aa0ba902b7"
# The substring "0ba" trips typos' "ba" → "be"/"by" rule. The identifier
# is a literal from the W3C traceparent spec example, so we allow it.
"00f067aa0ba902b7" = "00f067aa0ba902b7"
